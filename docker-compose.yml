version: "3.8"
services:
  db:
    image: postgres:16-alpine
    container_name: vending-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vending_machine}
      POSTGRES_USER: ${POSTGRES_USER:-vending}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vending123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vending -d vending_machine"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./server
    container_name: vending-server
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vending}:${POSTGRES_PASSWORD:-vending123}@db:5432/${POSTGRES_DB:-vending_machine}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    container_name: vending-dashboard
    restart: always
    environment:
      API_URL: ${API_URL:-http://web:5000}
    ports:
      - "8501:8501"
    depends_on:
      - web

  # Cloudflare Tunnel — uncomment after getting token from Cloudflare Dashboard
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: vending-tunnel
    restart: always
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web

volumes:
  postgres_data:
