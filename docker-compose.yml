services:
  postgres:
    image: postgres:16-alpine
    container_name: vending_postgres
    env_file: .env          # ← Load .env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      POSTGRES_INITDB_ARGS: "-c fsync=off"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vending_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto
    container_name: vending_mosquitto
    env_file: .env          # ← Load .env file
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    networks:
      - vending_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vending_server
    env_file: .env          # ← Load .env file
    environment:
      FLASK_ENV: ${FLASK_ENV}
      FLASK_APP: ${FLASK_APP}
      DATABASE_URL: ${DATABASE_URL}
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT}
      MAX_IMAGE_SIZE: ${MAX_IMAGE_SIZE}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "5000:5000"
    volumes:
      - ./server/static/images:/app/static/images
      - ./server/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - vending_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vending_dashboard
    env_file: .env          # ← Load .env file
    environment:
      DASHBOARD_SERVER_URL: ${DASHBOARD_SERVER_URL}
      API_URL: ${API_URL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "8501:8501"
    volumes:
      # Ánh xạ chung thư mục ảnh với server để cả 2 cùng đọc/ghi được
      - ./server/static/images:/app/static/images 
    depends_on:
      - server
      - mosquitto
    networks:
      - vending_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
